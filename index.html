<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>검사기 라이브 뷰어</title>
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #141b24;
      --text: #f4f7fb;
      --muted: #9aa7b8;
      --accent-active: #7bc4ff;
      --border: rgba(255, 255, 255, 0.12);
      --ui-z: 9999;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .gate {
      position: fixed;
      inset: 0;
      z-index: calc(var(--ui-z) + 1);
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .gate.visible { display: flex; }

    .gate-card {
      width: min(100%, 380px);
      padding: 32px 28px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
    }

    .gate-card h1 { margin: 0 0 8px; font-size: 22px; }
    .gate-card p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }

    .gate-card input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b0f14;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .gate-card button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #2d7dd2;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .gate-error {
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 13px;
      min-height: 18px;
    }

    .app {
      position: fixed;
      inset: 0;
      background: #000;
    }

    .app.is-hidden { display: none; }

    .player-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .overlay-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--ui-z);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(20, 27, 36, 0.92);
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4d4f;
      box-shadow: 0 0 12px rgba(255, 77, 79, 0.8);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .hint { color: var(--muted); font-size: 13px; }

    .channel-bar {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: var(--ui-z);
      display: flex;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(11, 15, 20, 0.95);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }

    .channel-btn {
      min-width: 88px;
      padding: 16px 18px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .channel-btn.active {
      background: rgba(77, 163, 255, 0.2);
      border-color: rgba(123, 196, 255, 0.7);
      color: var(--accent-active);
    }

    @media (max-width: 720px) {
      .channel-bar {
        left: 8px;
        right: 8px;
        transform: none;
        width: calc(100% - 16px);
        justify-content: stretch;
      }
      .channel-btn {
        flex: 1;
        min-width: 0;
        padding: 14px 8px;
        font-size: 15px;
      }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1>검사기 라이브</h1>
      <p>접근 코드를 입력하세요.</p>
      <input id="gateInput" type="password" placeholder="접근 코드" autocomplete="off" />
      <button type="button" id="gateSubmit">입장</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div class="app is-hidden" id="app">
    <div class="player-wrap">
      <iframe
        id="liveFrame"
        title="검사기 라이브"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

    <div class="overlay-top">
      <div class="badge">
        <span class="live-dot"></span>
        <span id="currentLabel">전체</span>
      </div>
      <div class="hint" id="hint"></div>
    </div>

    <nav class="channel-bar" id="channelBar" aria-label="공장 선택"></nav>
  </div>

  <script>
    let { channels, defaultChannel, accessKey = "" } = window.LIVE_CONFIG;
    const channelOrder = Object.keys(channels);
    // Keep this fairly short so long-lived / fullscreen tabs pick up new
    // live video IDs without anyone pressing refresh.
    const CONFIG_POLL_MS = 5000;
    // Even when the video ID is unchanged, long-lived YouTube embeds can drift
    // behind the live edge. Force a remount periodically to re-sync realtime.
    const LIVE_RESYNC_MS = 300000; // 5분마다 강제 재동기화
    const RECOVERY_RETRY_MS = 20000;
    let currentChannelKey = null;
    let activeEmbedIdentity = "";
    let lastMountedAt = 0;

    const gate = document.getElementById("gate");
    const gateInput = document.getElementById("gateInput");
    const gateSubmit = document.getElementById("gateSubmit");
    const gateError = document.getElementById("gateError");
    const app = document.getElementById("app");
    const playerWrap = document.querySelector(".player-wrap");
    let iframe = document.getElementById("liveFrame");
    const currentLabel = document.getElementById("currentLabel");
    const hint = document.getElementById("hint");
    const channelBar = document.getElementById("channelBar");
    const STORAGE_KEY = "live-viewer-access";

    let viewerReady = false;

    hint.textContent = channelOrder
      .map((key, i) => `${i + 1} ${channels[key].label}`)
      .join(" · ");

    channelBar.innerHTML = channelOrder
      .map(
        (key) =>
          `<button class="channel-btn" type="button" data-channel="${key}">${channels[key].label}</button>`
      )
      .join("");

    const buttons = [...document.querySelectorAll(".channel-btn")];

    function embedIdentity(channel) {
      if (!channel) return "";
      if (channel.youtubeChannelId) return "ch:" + channel.youtubeChannelId;
      return "vid:" + (channel.youtubeVideoId || "");
    }

    function embedUrl(channel) {
      // Keep embed params minimal — extra enablejsapi/origin flags have caused
      // YouTube "Error 153" player configuration failures for some viewers.
      const params = "?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&playsinline=1&fs=1";
      if (channel.youtubeChannelId) {
        return (
          "https://www.youtube.com/embed/live_stream?channel=" +
          encodeURIComponent(channel.youtubeChannelId) +
          params
        );
      }
      return (
        "https://www.youtube.com/embed/" +
        encodeURIComponent(channel.youtubeVideoId) +
        params
      );
    }

    function isAccessGranted() {
      if (!accessKey) return true;
      const urlKey = new URLSearchParams(location.search).get("key");
      if (urlKey === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        return true;
      }
      return sessionStorage.getItem(STORAGE_KEY) === accessKey;
    }

    function showGate() {
      gate.classList.add("visible");
      app.classList.add("is-hidden");
      gateInput.focus();
    }

    function showApp() {
      gate.classList.remove("visible");
      app.classList.remove("is-hidden");
      if (!viewerReady) initViewer();
    }

    function tryAccess(value) {
      if (value === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        showApp();
        return;
      }
      gateError.textContent = "접근 코드가 올바르지 않습니다.";
    }

    gateSubmit.addEventListener("click", () => tryAccess(gateInput.value.trim()));
    gateInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryAccess(gateInput.value.trim());
    });

    function remountIframe() {
      const next = document.createElement("iframe");
      next.id = "liveFrame";
      next.title = "검사기 라이브";
      next.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
      next.setAttribute("allowfullscreen", "");
      next.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
      const current = document.getElementById("liveFrame") || iframe;
      if (current && current.parentNode) {
        current.replaceWith(next);
      } else if (playerWrap) {
        playerWrap.appendChild(next);
      }
      iframe = next;
      return iframe;
    }

    let recoveryTimer = null;
    function recoverFromStaleStream(reason) {
      if (recoveryTimer) return;
      console.warn("stream recovery:", reason);
      recoveryTimer = setTimeout(async () => {
        recoveryTimer = null;
        const swapped = await syncFromLatestConfig({ force: true });
        if (!swapped) {
          // Watcher may not have published the new ID yet — retry soon.
          setTimeout(() => syncFromLatestConfig({ force: true }), RECOVERY_RETRY_MS);
        }
      }, 1500);
    }

    function listenForYoutubeEnded(frame) {
      // Ask the embed to emit API events (ended / errors) via postMessage.
      frame.addEventListener("load", () => {
        try {
          frame.contentWindow.postMessage(
            JSON.stringify({ event: "listening", id: frame.id }),
            "https://www.youtube.com"
          );
        } catch (_) {}
      });
    }

    window.addEventListener("message", (event) => {
      if (event.origin !== "https://www.youtube.com") return;
      let data = event.data;
      try {
        if (typeof data === "string") data = JSON.parse(data);
      } catch (_) {
        return;
      }
      if (!data || typeof data !== "object") return;
      // onStateChange: 0 = ended
      if (data.event === "onStateChange" && data.info === 0) {
        recoverFromStaleStream("ended");
      }
      if (data.event === "onError") {
        recoverFromStaleStream("error");
      }
    });

    function mountChannel(channel, { force = false } = {}) {
      if (!channel) return false;
      const identity = embedIdentity(channel);
      if (!force && identity && identity === activeEmbedIdentity) return false;

      activeEmbedIdentity = identity;
      lastMountedAt = Date.now();
      remountIframe();
      listenForYoutubeEnded(iframe);
      // Plain embed URL — reliable for unlisted live streams.
      // (YT.Player on an empty iframe was wiping #liveFrame and showing black.)
      iframe.src = embedUrl(channel) + "&_=" + Date.now();
      return true;
    }

    function setChannel(channelKey, { force = false } = {}) {
      const channel = channels[channelKey];
      if (!channel) return;

      currentChannelKey = channelKey;

      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.channel === channelKey);
      });
      currentLabel.textContent = channel.label;

      const params = new URLSearchParams(location.search);
      params.set("ch", channelKey);
      if (accessKey) params.set("key", accessKey);
      history.replaceState(null, "", "?" + params.toString());

      mountChannel(channel, { force });
    }

    function parseConfigJs(text) {
      const sandbox = {};
      new Function("window", text)(sandbox);
      if (!sandbox.LIVE_CONFIG) throw new Error("LIVE_CONFIG missing in fetched config.js");
      return sandbox.LIVE_CONFIG;
    }

    async function fetchLatestConfig() {
      const remoteUrl = window.LIVE_CONFIG?.remoteConfigUrl;
      const sources = [];
      if (remoteUrl) {
        sources.push(remoteUrl + (remoteUrl.includes("?") ? "&" : "?") + "_=" + Date.now());
      }
      sources.push("config.js?_=" + Date.now());

      let lastError = null;
      for (const url of sources) {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error("fetch failed: " + res.status);
          return parseConfigJs(await res.text());
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error("config.js fetch failed");
    }

    async function syncFromLatestConfig({ force = false } = {}) {
      try {
        const fresh = await fetchLatestConfig();
        channels = fresh.channels;
        if (fresh.remoteConfigUrl) {
          window.LIVE_CONFIG.remoteConfigUrl = fresh.remoteConfigUrl;
        }
        if (!currentChannelKey) return false;
        const freshChannel = channels[currentChannelKey];
        if (!freshChannel) return false;

        const identity = embedIdentity(freshChannel);
        const idChanged = identity && identity !== activeEmbedIdentity;
        const dueForResync =
          !!activeEmbedIdentity && Date.now() - lastMountedAt >= LIVE_RESYNC_MS;

        if (force || idChanged || dueForResync) {
          if (force || dueForResync) activeEmbedIdentity = "";
          return mountChannel(freshChannel, { force: true });
        }
        return false;
      } catch (err) {
        console.warn("config.js poll failed, will retry:", err);
        return false;
      }
    }

    function pollForConfigUpdates() {
      let pollInFlight = false;
      const tick = async () => {
        if (pollInFlight) return;
        pollInFlight = true;
        try {
          await syncFromLatestConfig();
        } finally {
          pollInFlight = false;
        }
      };

      tick();
      setInterval(tick, CONFIG_POLL_MS);

      // Background tabs get throttled timers — catch up as soon as visible again.
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") tick();
      });
      window.addEventListener("focus", tick);
    }

    function initViewer() {
      viewerReady = true;

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => setChannel(btn.dataset.channel));
      });

      window.addEventListener("keydown", (e) => {
        const index = Number(e.key) - 1;
        if (index >= 0 && index < channelOrder.length) {
          setChannel(channelOrder[index]);
        }
      });

      const initial =
        new URLSearchParams(location.search).get("ch") ||
        defaultChannel ||
        channelOrder[0];

      setChannel(channels[initial] ? initial : channelOrder[0]);
      pollForConfigUpdates();
    }

    if (isAccessGranted()) showApp();
    else showGate();
  </script>
</body>
</html>
