<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>검사기 라이브 뷰어</title>
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #141b24;
      --text: #f4f7fb;
      --muted: #9aa7b8;
      --border: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: #000; color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .gate {
      position: fixed; inset: 0; z-index: 20;
      display: none; align-items: center; justify-content: center;
      background: var(--bg); padding: 24px;
    }
    .gate.visible { display: flex; }
    .gate-card {
      width: min(100%, 380px); padding: 32px 28px; border-radius: 18px;
      background: var(--panel); border: 1px solid var(--border); text-align: center;
    }
    .gate-card h1 { margin: 0 0 8px; font-size: 22px; }
    .gate-card p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
    .gate-card input {
      width: 100%; padding: 14px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: #0b0f14; color: var(--text);
      font-size: 16px; margin-bottom: 12px;
    }
    .gate-card button {
      width: 100%; padding: 14px; border: 0; border-radius: 10px;
      background: #2d7dd2; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .gate-error { margin-top: 10px; color: #ff6b6b; font-size: 13px; min-height: 18px; white-space: pre-wrap; }
    .app { position: fixed; inset: 0; background: #000; }
    .app.is-hidden { display: none; }
    #liveFrame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: 0; background: #000; display: block;
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1>검사기 라이브</h1>
      <p>접근 코드를 입력하세요.</p>
      <input id="gateInput" type="password" placeholder="접근 코드" autocomplete="off" />
      <button type="button" id="gateSubmit">입장</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div class="app is-hidden" id="app">
    <!-- 허브 뷰어(연속 MJPEG)를 그대로 임베드 — 깜빡이는 JPEG 폴링 안 씀 -->
    <iframe id="liveFrame" title="검사기 라이브" allow="fullscreen" allowfullscreen></iframe>
  </div>

  <script>
    const STORAGE_KEY = "live-viewer-access";
    let cfg = window.LIVE_CONFIG || {};
    let accessKey = cfg.accessKey || "";
    let hubBase = "";

    const gate = document.getElementById("gate");
    const gateInput = document.getElementById("gateInput");
    const gateSubmit = document.getElementById("gateSubmit");
    const gateError = document.getElementById("gateError");
    const app = document.getElementById("app");
    const liveFrame = document.getElementById("liveFrame");

    function isAccessGranted() {
      if (!accessKey) return true;
      const urlKey = new URLSearchParams(location.search).get("key");
      if (urlKey === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        return true;
      }
      return sessionStorage.getItem(STORAGE_KEY) === accessKey;
    }

    function showGate() {
      gate.classList.add("visible");
      app.classList.add("is-hidden");
      gateInput.focus();
    }

    function viewerUrl() {
      const params = new URLSearchParams(location.search);
      const ch = params.get("ch") || cfg.defaultChannel || "all";
      const q = new URLSearchParams();
      if (accessKey) q.set("key", accessKey);
      q.set("ch", ch);
      return hubBase.replace(/\/$/, "") + "/viewer?" + q.toString();
    }

    function showApp() {
      gate.classList.remove("visible");
      app.classList.remove("is-hidden");
      liveFrame.src = viewerUrl();
    }

    function tryAccess(value) {
      if (value === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        showApp();
        return;
      }
      gateError.textContent = "접근 코드가 올바르지 않습니다.";
    }
    gateSubmit.addEventListener("click", () => tryAccess(gateInput.value.trim()));
    gateInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryAccess(gateInput.value.trim());
    });

    async function probeHub(base) {
      const root = String(base || "").replace(/\/$/, "");
      if (!root) return null;
      if (location.protocol === "https:" && root.startsWith("http:")) return null;
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 5000);
      try {
        const res = await fetch(root + "/api/viewer/channels", {
          cache: "no-store",
          mode: "cors",
          signal: ctrl.signal,
        });
        clearTimeout(t);
        if (!res.ok) return null;
        return { root, data: await res.json() };
      } catch (_) {
        clearTimeout(t);
        return null;
      }
    }

    async function resolveHub() {
      const bases = Array.isArray(cfg.hubBaseUrls) ? cfg.hubBaseUrls.slice() : [];
      try {
        const remote = cfg.remoteConfigUrl;
        if (remote) {
          const res = await fetch(
            remote + (remote.includes("?") ? "&" : "?") + "_=" + Date.now(),
            { cache: "no-store" }
          );
          if (res.ok) {
            const text = await res.text();
            const sandbox = {};
            new Function("window", text)(sandbox);
            if (sandbox.LIVE_CONFIG?.hubBaseUrls) {
              bases.unshift(...sandbox.LIVE_CONFIG.hubBaseUrls);
            }
            if (sandbox.LIVE_CONFIG?.accessKey) {
              accessKey = sandbox.LIVE_CONFIG.accessKey;
            }
          }
        }
      } catch (_) {}

      const seen = new Set();
      for (const base of bases) {
        const key = String(base || "");
        if (!key || seen.has(key)) continue;
        seen.add(key);
        const hit = await probeHub(base);
        if (hit) return hit;
      }
      return null;
    }

    async function boot() {
      gate.classList.add("visible");
      gateError.textContent = "허브 연결 중…";
      const hit = await resolveHub();
      if (!hit) {
        gateError.textContent =
          "허브에 연결할 수 없습니다.\n메인 PC에서 허브 + START_PUBLIC.bat 을 켜 주세요.";
        return;
      }
      hubBase = hit.root;
      accessKey = hit.data.accessKey || accessKey || cfg.accessKey || "";
      gateError.textContent = "";
      if (isAccessGranted()) showApp();
      else showGate();
    }

    boot();
  </script>
</body>
</html>
