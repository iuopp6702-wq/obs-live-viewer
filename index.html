<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>검사기 라이브 뷰어</title>
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #141b24;
      --text: #f4f7fb;
      --muted: #9aa7b8;
      --accent-active: #7bc4ff;
      --border: rgba(255, 255, 255, 0.12);
      --ui-z: 9999;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .gate {
      position: fixed;
      inset: 0;
      z-index: calc(var(--ui-z) + 1);
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .gate.visible { display: flex; }

    .gate-card {
      width: min(100%, 380px);
      padding: 32px 28px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
    }

    .gate-card h1 { margin: 0 0 8px; font-size: 22px; }
    .gate-card p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }

    .gate-card input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b0f14;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .gate-card button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #2d7dd2;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .gate-error {
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 13px;
      min-height: 18px;
    }

    .app {
      position: fixed;
      inset: 0;
      background: #000;
    }

    .app.is-hidden { display: none; }

    .player-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .overlay-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--ui-z);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(20, 27, 36, 0.92);
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4d4f;
      box-shadow: 0 0 12px rgba(255, 77, 79, 0.8);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .hint { color: var(--muted); font-size: 13px; }

    .channel-bar {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: var(--ui-z);
      display: flex;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(11, 15, 20, 0.95);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
    }

    .channel-btn {
      min-width: 88px;
      padding: 16px 18px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .channel-btn.active {
      background: rgba(77, 163, 255, 0.2);
      border-color: rgba(123, 196, 255, 0.7);
      color: var(--accent-active);
    }

    @media (max-width: 720px) {
      .channel-bar {
        left: 8px;
        right: 8px;
        transform: none;
        width: calc(100% - 16px);
        justify-content: stretch;
      }
      .channel-btn {
        flex: 1;
        min-width: 0;
        padding: 14px 8px;
        font-size: 15px;
      }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1>검사기 라이브</h1>
      <p>접근 코드를 입력하세요.</p>
      <input id="gateInput" type="password" placeholder="접근 코드" autocomplete="off" />
      <button type="button" id="gateSubmit">입장</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div class="app is-hidden" id="app">
    <div class="player-wrap">
      <iframe
        id="liveFrame"
        title="검사기 라이브"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

    <div class="overlay-top">
      <div class="badge">
        <span class="live-dot"></span>
        <span id="currentLabel">전체</span>
      </div>
      <div class="hint" id="hint"></div>
    </div>

    <nav class="channel-bar" id="channelBar" aria-label="공장 선택"></nav>
  </div>

  <script>
    let { channels, defaultChannel, accessKey = "" } = window.LIVE_CONFIG;
    const channelOrder = Object.keys(channels);
    const CONFIG_POLL_MS = 15000;
    let currentChannelKey = null;

    const gate = document.getElementById("gate");
    const gateInput = document.getElementById("gateInput");
    const gateSubmit = document.getElementById("gateSubmit");
    const gateError = document.getElementById("gateError");
    const app = document.getElementById("app");
    const iframe = document.getElementById("liveFrame");
    const currentLabel = document.getElementById("currentLabel");
    const hint = document.getElementById("hint");
    const channelBar = document.getElementById("channelBar");
    const STORAGE_KEY = "live-viewer-access";

    let viewerReady = false;

    hint.textContent = channelOrder
      .map((key, i) => `${i + 1} ${channels[key].label}`)
      .join(" · ");

    channelBar.innerHTML = channelOrder
      .map(
        (key) =>
          `<button class="channel-btn" type="button" data-channel="${key}">${channels[key].label}</button>`
      )
      .join("");

    const buttons = [...document.querySelectorAll(".channel-btn")];

    function embedUrl(channel) {
      const params = "?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&playsinline=1&fs=1";
      // 채널 ID가 있으면 '현재 라이브 중인 영상'을 자동으로 찾아 재생 (영상 ID가 바뀌어도 갱신 불필요)
      if (channel.youtubeChannelId) {
        return (
          "https://www.youtube.com/embed/live_stream?channel=" +
          encodeURIComponent(channel.youtubeChannelId) +
          params
        );
      }
      return (
        "https://www.youtube.com/embed/" +
        encodeURIComponent(channel.youtubeVideoId) +
        params
      );
    }

    function isAccessGranted() {
      if (!accessKey) return true;
      const urlKey = new URLSearchParams(location.search).get("key");
      if (urlKey === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        return true;
      }
      return sessionStorage.getItem(STORAGE_KEY) === accessKey;
    }

    function showGate() {
      gate.classList.add("visible");
      app.classList.add("is-hidden");
      gateInput.focus();
    }

    function showApp() {
      gate.classList.remove("visible");
      app.classList.remove("is-hidden");
      if (!viewerReady) initViewer();
    }

    function tryAccess(value) {
      if (value === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        showApp();
        return;
      }
      gateError.textContent = "접근 코드가 올바르지 않습니다.";
    }

    gateSubmit.addEventListener("click", () => tryAccess(gateInput.value.trim()));
    gateInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryAccess(gateInput.value.trim());
    });

    function setChannel(channelKey) {
      const channel = channels[channelKey];
      if (!channel) return;

      currentChannelKey = channelKey;

      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.channel === channelKey);
      });
      currentLabel.textContent = channel.label;

      const params = new URLSearchParams(location.search);
      params.set("ch", channelKey);
      if (accessKey) params.set("key", accessKey);
      history.replaceState(null, "", "?" + params.toString());

      iframe.src = embedUrl(channel);
    }

    // Live streams get a fresh video ID whenever the encoder reconnects and a
    // new broadcast starts. A background watcher keeps config.js up to date
    // automatically, but a tab left open would otherwise keep showing the
    // ended broadcast until manually reloaded. So we poll config.js in the
    // background and hot-swap the iframe when the active channel's video
    // actually changes - no manual refresh needed.
    async function fetchLatestConfig() {
      const res = await fetch("config.js?_=" + Date.now(), { cache: "no-store" });
      if (!res.ok) throw new Error("config.js fetch failed: " + res.status);
      const text = await res.text();
      const sandbox = {};
      new Function("window", text)(sandbox);
      if (!sandbox.LIVE_CONFIG) throw new Error("LIVE_CONFIG missing in fetched config.js");
      return sandbox.LIVE_CONFIG;
    }

    function pollForConfigUpdates() {
      setInterval(async () => {
        try {
          const fresh = await fetchLatestConfig();
          channels = fresh.channels;
          if (!currentChannelKey) return;
          const freshChannel = channels[currentChannelKey];
          if (!freshChannel) return;
          const newUrl = embedUrl(freshChannel);
          if (newUrl !== iframe.src) {
            iframe.src = newUrl;
          }
        } catch (err) {
          console.warn("config.js poll failed, will retry:", err);
        }
      }, CONFIG_POLL_MS);
    }

    function initViewer() {
      viewerReady = true;

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => setChannel(btn.dataset.channel));
      });

      window.addEventListener("keydown", (e) => {
        const index = Number(e.key) - 1;
        if (index >= 0 && index < channelOrder.length) {
          setChannel(channelOrder[index]);
        }
      });

      const initial =
        new URLSearchParams(location.search).get("ch") ||
        defaultChannel ||
        channelOrder[0];

      setChannel(channels[initial] ? initial : channelOrder[0]);
      pollForConfigUpdates();
    }

    if (isAccessGranted()) showApp();
    else showGate();
  </script>
</body>
</html>
