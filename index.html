<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>검사기 라이브 뷰어</title>
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #141b24;
      --text: #f4f7fb;
      --muted: #9aa7b8;
      --accent-active: #7bc4ff;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .player-wrap {
      position: absolute;
      inset: 0;
      background: #000;
    }

    .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .gate.visible { display: flex; }

    .gate-card {
      width: min(100%, 380px);
      padding: 32px 28px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
    }

    .gate-card h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .gate-card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .gate-card input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b0f14;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .gate-card button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #2d7dd2;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .gate-error {
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 13px;
      min-height: 18px;
    }

    .overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(20, 27, 36, 0.82);
      border: 1px solid var(--border);
      font-size: 14px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4d4f;
      box-shadow: 0 0 12px rgba(255, 77, 79, 0.8);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .hint { color: var(--muted); font-size: 13px; }

    .channel-bar {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(11, 15, 20, 0.82);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
    }

    .channel-btn {
      min-width: 92px;
      padding: 14px 20px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .channel-btn:hover {
      background: #1b2430;
      transform: translateY(-1px);
    }

    .channel-btn.active {
      background: rgba(77, 163, 255, 0.16);
      border-color: rgba(123, 196, 255, 0.55);
      color: var(--accent-active);
    }

    @media (max-width: 720px) {
      .channel-bar {
        left: 12px;
        right: 12px;
        transform: none;
        flex-wrap: wrap;
        justify-content: center;
      }
      .channel-btn { min-width: calc(50% - 8px); }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1>검사기 라이브</h1>
      <p>공유받은 접근 코드를 입력하세요.</p>
      <input id="gateInput" type="password" placeholder="접근 코드" autocomplete="off" />
      <button type="button" id="gateSubmit">입장</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div class="app" id="app" hidden>
    <div class="player-wrap">
      <iframe
        id="liveFrame"
        title="검사기 라이브"
        allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

    <div class="overlay-top">
      <div class="badge">
        <span class="live-dot"></span>
        <span id="currentLabel">전체</span>
      </div>
      <div class="hint">1 여주 · 2 양산 · 3 광주 · 4 전체</div>
    </div>

    <nav class="channel-bar" aria-label="공장 선택">
      <button class="channel-btn" data-channel="yeoju">여주</button>
      <button class="channel-btn" data-channel="yangsan">양산</button>
      <button class="channel-btn" data-channel="gwangju">광주</button>
      <button class="channel-btn" data-channel="all">전체</button>
    </nav>
  </div>

  <script>
    const { channels, defaultChannel, accessKey = "" } = window.LIVE_CONFIG;
    const gate = document.getElementById("gate");
    const gateInput = document.getElementById("gateInput");
    const gateSubmit = document.getElementById("gateSubmit");
    const gateError = document.getElementById("gateError");
    const app = document.getElementById("app");
    const iframe = document.getElementById("liveFrame");
    const currentLabel = document.getElementById("currentLabel");
    const buttons = [...document.querySelectorAll(".channel-btn")];

    const channelOrder = ["yeoju", "yangsan", "gwangju", "all"];
    const STORAGE_KEY = "live-viewer-access";

    function embedUrl(videoId) {
      return (
        "https://www.youtube.com/embed/" +
        encodeURIComponent(videoId) +
        "?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&playsinline=1&fs=1"
      );
    }

    function isAccessGranted() {
      if (!accessKey) return true;
      const urlKey = new URLSearchParams(location.search).get("key");
      if (urlKey === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        return true;
      }
      return sessionStorage.getItem(STORAGE_KEY) === accessKey;
    }

    function showGate() {
      gate.classList.add("visible");
      app.hidden = true;
      gateInput.focus();
    }

    function showApp() {
      gate.classList.remove("visible");
      app.hidden = false;
      initViewer();
    }

    function tryAccess(value) {
      if (value === accessKey) {
        sessionStorage.setItem(STORAGE_KEY, accessKey);
        showApp();
        return;
      }
      gateError.textContent = "접근 코드가 올바르지 않습니다.";
    }

    gateSubmit.addEventListener("click", () => tryAccess(gateInput.value.trim()));
    gateInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") tryAccess(gateInput.value.trim());
    });

    function setChannel(channelKey) {
      const channel = channels[channelKey];
      if (!channel) return;

      buttons.forEach((button) => {
        button.classList.toggle("active", button.dataset.channel === channelKey);
      });
      currentLabel.textContent = channel.label;

      const params = new URLSearchParams(location.search);
      params.set("ch", channelKey);
      if (accessKey) params.set("key", accessKey);
      history.replaceState(null, "", "?" + params.toString());

      iframe.src = embedUrl(channel.youtubeVideoId);
    }

    function initViewer() {
      buttons.forEach((button) => {
        button.addEventListener("click", () => setChannel(button.dataset.channel));
      });

      window.addEventListener("keydown", (event) => {
        const index = Number(event.key) - 1;
        if (index >= 0 && index < channelOrder.length) {
          setChannel(channelOrder[index]);
        }
      });

      const initial =
        new URLSearchParams(location.search).get("ch") ||
        defaultChannel ||
        "all";

      setChannel(channels[initial] ? initial : "all");
    }

    if (isAccessGranted()) {
      showApp();
    } else {
      showGate();
    }
  </script>
</body>
</html>
